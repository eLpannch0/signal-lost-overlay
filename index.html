<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IRL Clean Signal Overlay</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  background: transparent;
  font-family: Arial, sans-serif;
}

.overlay {
  position: fixed;
  inset: 0;

  display: flex;
  justify-content: center;
  align-items: center;
  flex-direction: column;

  background: rgba(0, 0, 0, 0.34);

  backdrop-filter: blur(4px) brightness(0.78);
  -webkit-backdrop-filter: blur(4px) brightness(0.78);

  animation: fadeIn 0.8s ease, breathe 8s ease-in-out infinite;
}

.scanlines {
  position: absolute;
  inset: 0;
  background: repeating-linear-gradient(
    to bottom,
    rgba(255,255,255,0.018) 0px,
    rgba(255,255,255,0.018) 1px,
    transparent 3px,
    transparent 6px
  );
  opacity: 0.28;
  pointer-events: none;
}

.title {
  font-size: 92px;
  font-weight: 900;
  letter-spacing: 5px;
  text-transform: uppercase;

  background: linear-gradient(90deg, #00e5ff, #b76cff, #ff00ff, #ffffff, #00e5ff);
  background-size: 320% 100%;

  -webkit-background-clip: text;
  background-clip: text;
  color: transparent;

  text-shadow:
    0 0 14px rgba(0,229,255,0.45),
    0 0 28px rgba(255,0,255,0.34),
    0 0 54px rgba(0,229,255,0.22);

  animation: neonFlow 9s ease-in-out infinite;
}

.subtitle {
  margin-top: 24px;
  font-size: 30px;
  font-weight: 800;
  letter-spacing: 4px;
  color: rgba(255,255,255,0.92);

  text-shadow:
    0 0 10px rgba(255,255,255,0.45),
    0 0 22px rgba(183,108,255,0.35);

  animation: softGlow 5s ease-in-out infinite;
}

.tg {
  margin-top: 14px;
  font-size: 34px;
  font-weight: 900;
  letter-spacing: 2px;
  color: #00e5ff;

  text-shadow:
    0 0 10px rgba(0,229,255,0.58),
    0 0 26px rgba(0,229,255,0.38);

  animation: tgPulse 4s ease-in-out infinite;
}

@keyframes fadeIn {
  from {
    opacity: 0;
    filter: blur(8px);
  }
  to {
    opacity: 1;
    filter: blur(0);
  }
}

@keyframes breathe {
  0% {
    background: rgba(0, 0, 0, 0.30);
  }
  50% {
    background: rgba(0, 0, 0, 0.42);
  }
  100% {
    background: rgba(0, 0, 0, 0.30);
  }
}

@keyframes neonFlow {
  0% {
    background-position: 0% 50%;
    transform: scale(1);
  }
  50% {
    background-position: 100% 50%;
    transform: scale(1.012);
  }
  100% {
    background-position: 0% 50%;
    transform: scale(1);
  }
}

@keyframes softGlow {
  0% {
    opacity: 0.78;
  }
  50% {
    opacity: 1;
  }
  100% {
    opacity: 0.78;
  }
}

@keyframes tgPulse {
  0% {
    opacity: 0.72;
    transform: scale(1);
  }
  50% {
    opacity: 1;
    transform: scale(1.035);
  }
  100% {
    opacity: 0.72;
    transform: scale(1);
  }
}
</style>
</head>

<body>
  <div class="overlay">
    <div class="scanlines"></div>

    <div class="title">СИГНАЛ ПОТЕРЯН</div>
    <div class="subtitle">ПОДПИШИСЬ НА TELEGRAM</div>
    <div class="tg">t.me/elpannch0_live</div>
  </div>
</body>
</html>
