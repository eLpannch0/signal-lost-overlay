<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IRL SIGNAL LOST PRO</title>

<style>

html,
body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
}

/* ===== MAIN ===== */

.overlay{

position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:
radial-gradient(circle at center,
rgba(160,0,255,0.18) 0%,
rgba(0,0,0,0.72) 40%,
rgba(0,0,0,0.92) 100%
);

animation:introFlash 0.7s ease;

}

/* ===== LIVE BACKGROUND ===== */

.bgPulse{

position:absolute;
inset:-10%;

background:
radial-gradient(circle,
rgba(255,0,255,0.12),
transparent 70%);

filter:blur(80px);

animation:bgMove 8s ease-in-out infinite;

}

/* ===== SCANLINES ===== */

.scanlines{

position:absolute;
inset:0;

background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.025) 0px,
rgba(255,255,255,0.025) 2px,
transparent 4px,
transparent 6px
);

mix-blend-mode:screen;

animation:scanMove 8s linear infinite;

pointer-events:none;

}

/* ===== RANDOM GLITCH FLASH ===== */

.glitchFlash{

position:absolute;
inset:0;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.04),
transparent
);

opacity:0;

animation:flashRandom 4s infinite;

}

/* ===== WARNING ICON ===== */

.icon{

font-size:72px;

margin-bottom:20px;

color:white;

text-shadow:
0 0 10px #fff,
0 0 25px #ff00ff,
0 0 40px #00e5ff;

animation:iconPulse 2s infinite;

z-index:5;

}

/* ===== TITLE ===== */

.glitch{

position:relative;

font-size:96px;
font-weight:900;

color:#ff4dff;

letter-spacing:4px;

text-transform:uppercase;

z-index:5;

text-shadow:
0 0 10px #ff00ff,
0 0 20px #ff00ff,
0 0 40px #00e5ff,
0 0 80px #00e5ff;

animation:
mainFlicker 2s infinite,
mainShake 5s infinite;

}

/* RGB layers */

.glitch:before,
.glitch:after{

content:"СИГНАЛ ПОТЕРЯН";

position:absolute;
left:0;
top:0;

}

.glitch:before{

color:#00e5ff;

transform:translate(-4px,0);

opacity:0.7;

animation:rgb1 0.22s infinite;

}

.glitch:after{

color:#ff00ff;

transform:translate(4px,0);

opacity:0.7;

animation:rgb2 0.22s infinite;

}

/* ===== SUBTEXT ===== */

.sub{

margin-top:28px;

font-size:34px;
font-weight:800;

letter-spacing:4px;

color:white;

text-shadow:
0 0 8px #fff,
0 0 20px #ff00ff;

z-index:5;

animation:flickerSoft 3s infinite;

}

/* ===== TG ===== */

.tg{

margin-top:18px;

font-size:38px;
font-weight:900;

letter-spacing:2px;

color:#00e5ff;

z-index:5;

text-shadow:
0 0 10px #00e5ff,
0 0 25px #00e5ff,
0 0 45px #00e5ff;

animation:tgPulse 2s infinite;

}

/* ===== LOADING BAR ===== */

.bar{

margin-top:40px;

width:420px;
height:6px;

background:rgba(255,255,255,0.12);

border-radius:999px;

overflow:hidden;

z-index:5;

}

.bar:after{

content:"";

display:block;

width:40%;
height:100%;

background:
linear-gradient(
90deg,
#ff00ff,
#00e5ff,
#ff00ff
);

animation:loading 2s infinite ease-in-out;

}

/* ===== CORNERS ===== */

.corner{

position:absolute;

width:120px;
height:120px;

opacity:0.35;

border-color:#00e5ff;

animation:cornerPulse 3s infinite;

}

.tl{
top:40px;
left:40px;
border-top:2px solid;
border-left:2px solid;
}

.tr{
top:40px;
right:40px;
border-top:2px solid;
border-right:2px solid;
}

.bl{
bottom:40px;
left:40px;
border-bottom:2px solid;
border-left:2px solid;
}

.br{
bottom:40px;
right:40px;
border-bottom:2px solid;
border-right:2px solid;
}

/* ===== ANIMATIONS ===== */

@keyframes introFlash{

0%{
opacity:0;
transform:scale(1.03);
filter:blur(12px);
}

100%{
opacity:1;
transform:scale(1);
filter:blur(0);
}

}

@keyframes bgMove{

0%{
transform:translate(-2%,-2%) scale(1);
}

50%{
transform:translate(2%,2%) scale(1.08);
}

100%{
transform:translate(-2%,-2%) scale(1);
}

}

@keyframes scanMove{

0%{
transform:translateY(0);
}

100%{
transform:translateY(8px);
}

}

@keyframes flashRandom{

0%{opacity:0;}
5%{opacity:0;}
6%{opacity:1;}
7%{opacity:0;}

55%{opacity:0;}
56%{opacity:1;}
57%{opacity:0;}

100%{opacity:0;}

}

@keyframes rgb1{

0%{transform:translate(-4px,0);}
25%{transform:translate(-8px,2px);}
50%{transform:translate(2px,-2px);}
75%{transform:translate(-2px,1px);}
100%{transform:translate(-4px,0);}

}

@keyframes rgb2{

0%{transform:translate(4px,0);}
25%{transform:translate(8px,-2px);}
50%{transform:translate(-2px,2px);}
75%{transform:translate(2px,-1px);}
100%{transform:translate(4px,0);}

}

@keyframes mainFlicker{

0%{opacity:1;}
48%{opacity:1;}
49%{opacity:0.92;}
50%{opacity:1;}
70%{opacity:0.96;}
100%{opacity:1;}

}

@keyframes mainShake{

0%{transform:translate(0);}
96%{transform:translate(0);}
97%{transform:translate(-2px,1px);}
98%{transform:translate(2px,-1px);}
99%{transform:translate(-1px,2px);}
100%{transform:translate(0);}

}

@keyframes tgPulse{

0%{
transform:scale(1);
opacity:0.75;
}

50%{
transform:scale(1.06);
opacity:1;
}

100%{
transform:scale(1);
opacity:0.75;
}

}

@keyframes iconPulse{

0%{
transform:scale(1);
opacity:0.7;
}

50%{
transform:scale(1.1);
opacity:1;
}

100%{
transform:scale(1);
opacity:0.7;
}

}

@keyframes loading{

0%{
transform:translateX(-140%);
}

50%{
transform:translateX(100%);
}

100%{
transform:translateX(240%);
}

}

@keyframes flickerSoft{

0%{opacity:1;}
50%{opacity:0.9;}
100%{opacity:1;}

}

@keyframes cornerPulse{

0%{opacity:0.2;}
50%{opacity:0.55;}
100%{opacity:0.2;}

}

</style>
</head>

<body>

<div class="overlay">

<div class="bgPulse"></div>

<div class="scanlines"></div>

<div class="glitchFlash"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="icon">⚠</div>

<div class="glitch">
СИГНАЛ ПОТЕРЯН
</div>

<div class="sub">
ПОДПИШИСЬ НА TELEGRAM
</div>

<div class="tg">
t.me/elpannch0_live
</div>

<div class="bar"></div>

</div>

</body>
</html>
