<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Neon Social Overlay</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

body {
  width: 100vw;
  height: 100vh;
  background: transparent;
  overflow: hidden;
  font-family: "Arial Black", Arial, sans-serif;
}

.overlay {
  position: absolute;
  top: 35px;
  left: 50%;
  transform: translateX(-50%);
  width: 820px;
  padding: 8px 0;
}

.social-row {
  position: relative;
  height: 78px;
  margin-bottom: 18px;
  display: flex;
  align-items: center;
  gap: 34px;
  padding: 0 42px;
  border-radius: 40px;
  background: linear-gradient(
    90deg,
    rgba(10, 0, 20, 0.15),
    rgba(80, 0, 130, 0.35),
    rgba(10, 0, 20, 0.15)
  );
  overflow: hidden;
  box-shadow:
    0 0 18px rgba(180, 0, 255, 0.55),
    inset 0 0 22px rgba(180, 0, 255, 0.25);
  animation: rowBreath 3.8s ease-in-out infinite;
}

.icon {
  font-size: 46px;
  width: 58px;
  text-align: center;
  filter:
    drop-shadow(0 0 8px #bb00ff)
    drop-shadow(0 0 20px #9d00ff);
  animation: iconFloat 3s ease-in-out infinite;
}

.label {
  font-size: 38px;
  font-weight: 900;
  letter-spacing: 8px;
  color: #c94cff;
  text-shadow:
    0 0 6px #ffb3ff,
    0 0 14px #c000ff,
    0 0 32px #8a00ff;
  min-width: 290px;
}

.dot {
  font-size: 42px;
  color: #d260ff;
  text-shadow:
    0 0 8px #ffb3ff,
    0 0 20px #b000ff;
}

.nick {
  font-size: 38px;
  font-weight: 900;
  color: #ffffff;
  letter-spacing: 2px;
  text-shadow:
    0 0 6px #ffffff,
    0 0 16px #d66cff,
    0 0 32px #9d00ff;
}

.shine {
  position: absolute;
  top: 0;
  left: -70%;
  width: 45%;
  height: 100%;
  background: linear-gradient(
    115deg,
    transparent,
    rgba(255,255,255,0.12),
    rgba(224,0,255,0.55),
    rgba(255,255,255,0.18),
    transparent
  );
  filter: blur(8px);
  animation: shineMove 4s ease-in-out infinite;
}

.light-line {
  position: absolute;
  bottom: 6px;
  left: 50px;
  right: 50px;
  height: 3px;
  background: linear-gradient(
    90deg,
    transparent,
    #7d00ff,
    #ff00f7,
    #ffffff,
    #ff00f7,
    #7d00ff,
    transparent
  );
  box-shadow:
    0 0 8px #ff00ff,
    0 0 22px #a000ff;
  animation: lineMove 2.8s linear infinite;
}

.particles span {
  position: absolute;
  width: 4px;
  height: 4px;
  background: #e68cff;
  border-radius: 50%;
  box-shadow: 0 0 12px #d000ff;
  opacity: 0;
  animation: particle 4s linear infinite;
}

.particles span:nth-child(1) { left: 18%; top: 18%; animation-delay: 0s; }
.particles span:nth-child(2) { left: 45%; top: 72%; animation-delay: 1s; }
.particles span:nth-child(3) { left: 74%; top: 22%; animation-delay: 2s; }
.particles span:nth-child(4) { left: 86%; top: 68%; animation-delay: 3s; }

@keyframes shineMove {
  0% { left: -70%; opacity: 0; }
  18% { opacity: 1; }
  55% { left: 120%; opacity: 1; }
  100% { left: 120%; opacity: 0; }
}

@keyframes rowBreath {
  0%, 100% {
    transform: scale(1);
    box-shadow:
      0 0 16px rgba(180, 0, 255, 0.45),
      inset 0 0 18px rgba(180, 0, 255, 0.22);
  }
  50% {
    transform: scale(1.015);
    box-shadow:
      0 0 32px rgba(220, 0, 255, 0.8),
      inset 0 0 32px rgba(220, 0, 255, 0.35);
  }
}

@keyframes iconFloat {
  0%, 100% { transform: translateY(0) scale(1); }
  50% { transform: translateY(-3px) scale(1.08); }
}

@keyframes lineMove {
  0% { opacity: 0.45; filter: hue-rotate(0deg); }
  50% { opacity: 1; filter: hue-rotate(40deg); }
  100% { opacity: 0.45; filter: hue-rotate(0deg); }
}

@keyframes particle {
  0% {
    transform: translateY(10px) scale(0.5);
    opacity: 0;
  }
  30% { opacity: 1; }
  100% {
    transform: translateY(-35px) scale(1.2);
    opacity: 0;
  }
}

@media (max-width: 900px) {
  .overlay {
    width: 95vw;
  }

  .social-row {
    height: 62px;
    gap: 14px;
    padding: 0 20px;
  }

  .icon {
    font-size: 34px;
    width: 42px;
  }

  .label {
    font-size: 26px;
    min-width: 190px;
    letter-spacing: 4px;
  }

  .nick {
    font-size: 26px;
  }

  .dot {
    font-size: 28px;
  }
}
</style>
</head>

<body>

<div class="overlay">

  <div class="social-row">
    <div class="shine"></div>
    <div class="particles">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="icon">🟣</div>
    <div class="label">TWITCH</div>
    <div class="dot">•</div>
    <div class="nick">eLpannCh0</div>
    <div class="light-line"></div>
  </div>

  <div class="social-row">
    <div class="shine"></div>
    <div class="particles">
      <span></span><span></span><span></span><span></span>
    </div>
    <div class="icon">✈️</div>
    <div class="label">TELEGRAM</div>
    <div class="dot">•</div>
    <div class="nick">eLpannCh0_live</div>
    <div class="light-line"></div>
  </div>

</div>

</body>
</html>
