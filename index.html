<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IRL SIGNAL LOST PRO</title>

<style>

html,
body{
margin:0;
padding:0;
width:100%;
height:100%;
overflow:hidden;
background:#000;
font-family:Arial,sans-serif;
}

/* ===== MAIN OVERLAY ===== */

.overlay{

position:fixed;
inset:0;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:
radial-gradient(circle at center,
rgba(160,0,255,0.14) 0%,
rgba(0,0,0,0.72) 45%,
rgba(0,0,0,0.94) 100%
);

animation:introFade 1.2s ease;

}

/* ===== LIVING BACKGROUND ===== */

.bgPulse{

position:absolute;
inset:-10%;

background:
radial-gradient(circle,
rgba(255,0,255,0.08),
transparent 70%);

filter:blur(90px);

animation:bgMove 12s ease-in-out infinite;

}

/* ===== SCANLINES ===== */

.scanlines{

position:absolute;
inset:0;

background:
repeating-linear-gradient(
to bottom,
rgba(255,255,255,0.018) 0px,
rgba(255,255,255,0.018) 2px,
transparent 4px,
transparent 6px
);

opacity:0.45;

mix-blend-mode:screen;

animation:scanMove 12s linear infinite;

pointer-events:none;

}

/* ===== SMOOTH GLITCH LIGHT ===== */

.glowFlash{

position:absolute;
inset:0;

background:
linear-gradient(
90deg,
transparent,
rgba(255,255,255,0.025),
transparent
);

opacity:0;

animation:softFlash 8s infinite;

}

/* ===== WARNING ICON ===== */

.icon{

font-size:74px;

margin-bottom:24px;

color:white;

text-shadow:
0 0 10px rgba(255,255,255,0.7),
0 0 25px rgba(255,0,255,0.55),
0 0 40px rgba(0,229,255,0.45);

animation:iconPulse 4s ease-in-out infinite;

z-index:5;

}

/* ===== MAIN TITLE ===== */

.glitch{

position:relative;

font-size:96px;
font-weight:900;

letter-spacing:4px;
text-transform:uppercase;

z-index:5;

background:
linear-gradient(
90deg,
#00e5ff,
#ff00ff,
#ffffff,
#ff00ff,
#00e5ff
);

background-size:300% 100%;

-webkit-background-clip:text;
background-clip:text;

color:transparent;

text-shadow:
0 0 14px rgba(0,229,255,0.7),
0 0 30px rgba(255,0,255,0.55),
0 0 60px rgba(0,229,255,0.35);

animation:neonFlow 8s ease-in-out infinite;

}

/* ===== SUBTEXT ===== */

.sub{

margin-top:28px;

font-size:34px;
font-weight:800;

letter-spacing:4px;

color:white;

text-shadow:
0 0 8px rgba(255,255,255,0.75),
0 0 20px rgba(255,0,255,0.4);

z-index:5;

animation:softTextGlow 5s ease-in-out infinite;

}

/* ===== TELEGRAM ===== */

.tg{

margin-top:18px;

font-size:40px;
font-weight:900;

letter-spacing:2px;

color:#00e5ff;

z-index:5;

text-shadow:
0 0 10px rgba(0,229,255,0.75),
0 0 24px rgba(0,229,255,0.55),
0 0 40px rgba(255,0,255,0.35);

animation:tgPulse 3s ease-in-out infinite;

}

/* ===== LOADING BAR ===== */

.bar{

margin-top:42px;

width:420px;
height:6px;

background:rgba(255,255,255,0.12);

border-radius:999px;

overflow:hidden;

z-index:5;

}

.bar:after{

content:"";

display:block;

width:35%;
height:100%;

background:
linear-gradient(
90deg,
#ff00ff,
#00e5ff,
#ffffff,
#00e5ff,
#ff00ff
);

border-radius:999px;

animation:loading 4s ease-in-out infinite;

}

/* ===== CORNERS ===== */

.corner{

position:absolute;

width:120px;
height:120px;

opacity:0.18;

border-color:#00e5ff;

animation:cornerGlow 6s ease-in-out infinite;

}

.tl{
top:40px;
left:40px;
border-top:2px solid;
border-left:2px solid;
}

.tr{
top:40px;
right:40px;
border-top:2px solid;
border-right:2px solid;
}

.bl{
bottom:40px;
left:40px;
border-bottom:2px solid;
border-left:2px solid;
}

.br{
bottom:40px;
right:40px;
border-bottom:2px solid;
border-right:2px solid;
}

/* ===== ANIMATIONS ===== */

@keyframes introFade{

0%{
opacity:0;
transform:scale(1.02);
filter:blur(10px);
}

100%{
opacity:1;
transform:scale(1);
filter:blur(0);
}

}

@keyframes neonFlow{

0%{
background-position:0% 50%;
filter:brightness(1);
transform:scale(1);
}

50%{
background-position:100% 50%;
filter:brightness(1.16);
transform:scale(1.01);
}

100%{
background-position:0% 50%;
filter:brightness(1);
transform:scale(1);
}

}

@keyframes bgMove{

0%{
transform:translate(-2%,-2%) scale(1);
}

50%{
transform:translate(2%,2%) scale(1.06);
}

100%{
transform:translate(-2%,-2%) scale(1);
}

}

@keyframes scanMove{

0%{
transform:translateY(0);
}

100%{
transform:translateY(8px);
}

}

@keyframes softFlash{

0%{opacity:0;}
45%{opacity:0;}
50%{opacity:0.18;}
55%{opacity:0;}
100%{opacity:0;}

}

@keyframes tgPulse{

0%{
transform:scale(1);
opacity:0.72;
}

50%{
transform:scale(1.04);
opacity:1;
}

100%{
transform:scale(1);
opacity:0.72;
}

}

@keyframes iconPulse{

0%{
opacity:0.65;
transform:scale(1);
}

50%{
opacity:1;
transform:scale(1.05);
}

100%{
opacity:0.65;
transform:scale(1);
}

}

@keyframes loading{

0%{
transform:translateX(-140%);
}

50%{
transform:translateX(120%);
}

100%{
transform:translateX(260%);
}

}

@keyframes cornerGlow{

0%{
opacity:0.12;
}

50%{
opacity:0.28;
}

100%{
opacity:0.12;
}

}

@keyframes softTextGlow{

0%{
opacity:0.82;
}

50%{
opacity:1;
}

100%{
opacity:0.82;
}

}

</style>
</head>

<body>

<div class="overlay">

<div class="bgPulse"></div>

<div class="scanlines"></div>

<div class="glowFlash"></div>

<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="icon">⚠</div>

<div class="glitch">
СИГНАЛ ПОТЕРЯН
</div>

<div class="sub">
ПОДПИШИСЬ НА TELEGRAM
</div>

<div class="tg">
t.me/elpannch0_live
</div>

<div class="bar"></div>

</div>

</body>
</html>
